name: Daily master_df Update

on:
  schedule:
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_NO_CACHE_DIR: 0
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  update:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Test network
        run: |
          curl -I https://pypi.org || echo "PyPI unreachable"
          python -m pip install --upgrade pip

      - name: Install core packages
        run: pip install yfinance pandas numpy fredapi newsapi-python python-dotenv

      - name: Install ML packages
        run: |
          pip install transformers
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Verify installs
        run: |
          python -c "import yfinance; print('yfinance', yfinance.__version__)"
          python -c "import pandas; print('pandas', pandas.__version__)"

      - name: Run daily update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY:  ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/update_master_df.py

      - name: Commit and push if master_df changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/SabinaLucy/genai-market.git
          git pull --rebase origin main
          git add data/processed/master_df.csv
          git diff --cached --quiet || (
            git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')" &&
            git push origin main
          )

      - name: Restart HuggingFace Space
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://huggingface.co/api/spaces/SabinaLucy/volarix/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN")
          echo "HF restart response: $STATUS"
