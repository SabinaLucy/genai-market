name: Daily master_df Update

on:
  schedule:
    # 6:30 AM ET on weekdays (11:30 UTC)
    - cron: '30 11 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip + HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-finbert-${{ hashFiles('scripts/update_master_df.py') }}
          restore-keys: |
            ${{ runner.os }}-finbert-

      - name: Install dependencies
        run: |
          pip install --quiet yfinance pandas numpy fredapi newsapi-python python-dotenv
          pip install --quiet transformers
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run daily update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY:  ${{ secrets.NEWSAPI_KEY }}
        run: |
          python scripts/update_master_df.py

      - name: Commit and push if master_df changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/master_df.csv
          git diff --cached --quiet || (
            git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')" &&
            git push
          )

      - name: Restart HuggingFace Space
        # Only runs if there were actual changes (new data was committed)
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Restarting HF Space to reload master_df..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://huggingface.co/api/spaces/SabinaLucy/volarix/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN")
          echo "HF API response code: $response"
          if [ "$response" = "200" ] || [ "$response" = "204" ]; then
            echo "✓ Space restart triggered successfully"
          else
            echo "⚠ Space restart returned $response — check HF_TOKEN secret"
          fi
