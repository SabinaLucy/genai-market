name: Daily master_df Update

on:
  schedule:
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/update_master_df.py') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-finbert
          restore-keys: ${{ runner.os }}-hf-

      - name: Verify network and install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install yfinance
          pip install pandas numpy
          pip install fredapi
          pip install newsapi-python
          pip install python-dotenv
          pip install transformers sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          echo "All packages installed successfully"
          python -c "import yfinance; print('yfinance OK:', yfinance.__version__)"
          python -c "import pandas; print('pandas OK:', pandas.__version__)"

      - name: Run daily update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY:  ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/update_master_df.py

      - name: Commit and push if master_df changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/master_df.csv
          git diff --cached --quiet || (
            git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')" &&
            git push
          )

      - name: Restart HuggingFace Space
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://huggingface.co/api/spaces/SabinaLucy/volarix/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN")
          echo "HF restart response: $STATUS"
